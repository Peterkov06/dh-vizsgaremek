<!doctype html>
<html>
  <head>
    <title>SignalR Cookie Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
  </head>
  <body>
    <h2>Login</h2>
    <input id="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />
    <button onclick="login()">Login</button>

    <a href="https://localhost:7261/api/auth/google-login"> Google login </a>

    <h2>Chat</h2>
    <button onclick="connect()">Connect to ChatHub</button>

    <script>
      const API = "https://localhost:7261";

      async function login() {
        console.log(
          document.getElementById("email").value,
          document.getElementById("password").value,
        );
        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });

        if (res.ok) {
          alert("Logged in! Cookie stored automatically.");

          const res = await fetch(`${API}/api/auth/me`, {
            method: "GET",
            credentials: "include",
          });

          console.log(res);
        } else {
          alert("Login failed");
        }
      }

      let connection;

      async function connect() {
        connection = new signalR.HubConnectionBuilder()
          .withUrl(`${API}/api/chathub`, {
            withCredentials: true,
          })
          .withAutomaticReconnect()
          .build();

        connection.on("ReceiveMessage", (msg) => {
          console.log("Message:", msg);
        });

        try {
          await connection.start();
          console.log("Connected to SignalR!");
        } catch (err) {
          console.error(err);
        }
      }
    </script>
  </body>
</html>
